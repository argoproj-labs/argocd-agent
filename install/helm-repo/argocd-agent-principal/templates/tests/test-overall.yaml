{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ printf "%s-overall" (include "argocd-agent-principal.testResourceName" .) | quote }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: {{ include "argocd-agent-principal.testResourceName" . }}
  containers:
    - name: kubectl
      image: "{{ .Values.tests.image }}:{{ .Values.tests.tag }}"
      command:
        - sh
        - -c
        - |
          echo "Testing Overall Chart Installation..."

          DEPLOYMENT_NAME={{ include "argocd-agent-principal.fullname" . | quote }}
          METRICS_SERVICE={{ include "argocd-agent-principal.metricsServiceName" . | quote }}
          HEALTHZ_SERVICE={{ include "argocd-agent-principal.healthzServiceName" . | quote }}

          # Count and verify all resources
          echo "Verifying resource counts..."

          # Count deployments
          DEPLOYMENT_COUNT=$(kubectl get deployments -n {{ include "argocd-agent-principal.namespace" . }} -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}" --no-headers | wc -l | tr -d ' ')
          if [ "$DEPLOYMENT_COUNT" = "1" ]; then
            echo "✓ Found $DEPLOYMENT_COUNT deployment(s)"
          else
            echo "✗ Expected 1 deployment, found $DEPLOYMENT_COUNT"
            exit 1
          fi

          # Count services (gRPC + metrics + healthz = 3 minimum)
          SERVICE_COUNT=$(kubectl get services -n {{ include "argocd-agent-principal.namespace" . }} -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}" --no-headers | wc -l)
          if [ "$SERVICE_COUNT" -ge "3" ]; then
            echo "✓ Found $SERVICE_COUNT service(s)"
          else
            echo "✗ Expected at least 3 services, found $SERVICE_COUNT"
            exit 1
          fi

          # Count configmaps
          CONFIGMAP_COUNT=$(kubectl get configmaps -n {{ include "argocd-agent-principal.namespace" . }} -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}" --no-headers | wc -l | tr -d ' ')
          if [ "$CONFIGMAP_COUNT" = "1" ]; then
            echo "✓ Found $CONFIGMAP_COUNT configmap(s)"
          else
            echo "✗ Expected 1 configmap, found $CONFIGMAP_COUNT"
            exit 1
          fi

          {{- if .Values.serviceAccount.create }}
          # Count service accounts
          SA_COUNT=$(kubectl get serviceaccounts -n {{ include "argocd-agent-principal.namespace" . }} -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}" --no-headers | wc -l | tr -d ' ')
          if [ "$SA_COUNT" = "1" ]; then
            echo "✓ Found $SA_COUNT service account(s)"
          else
            echo "✗ Expected 1 service account, found $SA_COUNT"
            exit 1
          fi
          {{- else }}
          SA_COUNT=0
          {{- end }}

          {{- if .Values.rbac.create }}
          # Count roles
          ROLE_COUNT=$(kubectl get roles -n {{ include "argocd-agent-principal.namespace" . }} -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}" --no-headers | wc -l | tr -d ' ')
          if [ "$ROLE_COUNT" = "1" ]; then
            echo "✓ Found $ROLE_COUNT role(s)"
          else
            echo "✗ Expected 1 role, found $ROLE_COUNT"
            exit 1
          fi

          # Count role bindings
          ROLEBINDING_COUNT=$(kubectl get rolebindings -n {{ include "argocd-agent-principal.namespace" . }} -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}" --no-headers | wc -l | tr -d ' ')
          if [ "$ROLEBINDING_COUNT" = "1" ]; then
            echo "✓ Found $ROLEBINDING_COUNT role binding(s)"
          else
            echo "✗ Expected 1 role binding, found $ROLEBINDING_COUNT"
            exit 1
          fi
          {{- else }}
          ROLE_COUNT=0
          ROLEBINDING_COUNT=0
          {{- end }}

          {{- if and .Values.rbac.create .Values.rbac.createClusterRole }}
          # Count cluster roles
          CLUSTERROLE_COUNT=$(kubectl get clusterroles -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}" --no-headers | wc -l | tr -d ' ')
          if [ "$CLUSTERROLE_COUNT" = "1" ]; then
            echo "✓ Found $CLUSTERROLE_COUNT cluster role(s)"
          else
            echo "✗ Expected 1 cluster role, found $CLUSTERROLE_COUNT"
            exit 1
          fi

          # Count cluster role bindings
          CLUSTERROLEBINDING_COUNT=$(kubectl get clusterrolebindings -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}" --no-headers | wc -l | tr -d ' ')
          if [ "$CLUSTERROLEBINDING_COUNT" = "1" ]; then
            echo "✓ Found $CLUSTERROLEBINDING_COUNT cluster role binding(s)"
          else
            echo "✗ Expected 1 cluster role binding, found $CLUSTERROLEBINDING_COUNT"
            exit 1
          fi
          {{- else }}
          CLUSTERROLE_COUNT=0
          CLUSTERROLEBINDING_COUNT=0
          {{- end }}

          # Verify all resources are in the correct namespace
          echo "Verifying namespace consistency..."
          WRONG_NS_RESOURCES=$(kubectl get deployments,services,configmaps,secrets,serviceaccounts,roles,rolebindings -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}" --all-namespaces --no-headers | grep -v "{{ include "argocd-agent-principal.namespace" . }}" | grep -v "default" | wc -l | tr -d ' ')
          if [ "$WRONG_NS_RESOURCES" = "0" ]; then
            echo "✓ All namespaced resources are in the correct namespace"
          else
            echo "✗ Found $WRONG_NS_RESOURCES resource(s) in wrong namespace"
            kubectl get all,configmaps,secrets,serviceaccounts,roles,rolebindings -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}" --all-namespaces --no-headers | grep -v "{{ include "argocd-agent-principal.namespace" . }}" | grep -v "default"
            exit 1
          fi

          # Check if deployment is ready
          echo "Checking deployment readiness..."
          EXPECTED_REPLICAS={{ .Values.replicaCount | quote }}
          READY_REPLICAS=$(kubectl get deployment "$DEPLOYMENT_NAME" -n {{ include "argocd-agent-principal.namespace" . }} -o jsonpath="{.status.readyReplicas}")
          if [ "$READY_REPLICAS" = "$EXPECTED_REPLICAS" ]; then
            echo "✓ Deployment is ready with $READY_REPLICAS replica(s)"
          else
            echo "✗ Deployment not ready, ready replicas: $READY_REPLICAS (expected $EXPECTED_REPLICAS)"
            exit 1
          fi

          # Check if pods are running
          echo "Checking pod status..."
          RUNNING_PODS=$(kubectl get pods -n {{ include "argocd-agent-principal.namespace" . }} -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}" --no-headers | grep Running | wc -l | tr -d ' ')
          if [ "$RUNNING_PODS" = "$EXPECTED_REPLICAS" ]; then
            echo "✓ Found $RUNNING_PODS running pod(s)"
          else
            echo "✗ Expected $EXPECTED_REPLICAS running pod(s), found $RUNNING_PODS"
            kubectl get pods -n {{ include "argocd-agent-principal.namespace" . }} -l "app.kubernetes.io/name=argocd-agent-principal,app.kubernetes.io/instance={{ .Release.Name }}"
            exit 1
          fi

          # Wait a bit for services to get endpoints
          echo "Waiting for services to get endpoints..."
          sleep 10

          # Verify service endpoints
          echo "Checking service endpoints..."
          METRICS_ENDPOINT_IP=$(kubectl get endpoints "$METRICS_SERVICE" -n {{ include "argocd-agent-principal.namespace" . }} -o jsonpath="{.subsets[0].addresses[0].ip}" 2>/dev/null)
          if [ -n "$METRICS_ENDPOINT_IP" ]; then
            echo "✓ Metrics service has endpoints ($METRICS_ENDPOINT_IP)"
          else
            echo "✗ Metrics service has no endpoints"
            exit 1
          fi

          HEALTHZ_ENDPOINT_IP=$(kubectl get endpoints "$HEALTHZ_SERVICE" -n {{ include "argocd-agent-principal.namespace" . }} -o jsonpath="{.subsets[0].addresses[0].ip}" 2>/dev/null)
          if [ -n "$HEALTHZ_ENDPOINT_IP" ]; then
            echo "✓ Healthz service has endpoints ($HEALTHZ_ENDPOINT_IP)"
          else
            echo "✗ Healthz service has no endpoints"
            exit 1
          fi

          echo "Overall chart installation verified successfully!"
          echo "Total resources created: $((DEPLOYMENT_COUNT + SERVICE_COUNT + CONFIGMAP_COUNT + SA_COUNT + ROLE_COUNT + ROLEBINDING_COUNT + CLUSTERROLE_COUNT + CLUSTERROLEBINDING_COUNT))"
  restartPolicy: Never
{{- end }}
