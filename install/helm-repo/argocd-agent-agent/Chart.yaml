apiVersion: v2
name: argocd-agent-agent
description: Argo CD Agent for connecting managed clusters to a Principal
type: application
# chart version 
version: 0.2.0
# application version, ArgoCD Agent version
appVersion: 0.8.1
dependencies:
  - name: argo-cd
    # Resolved from go.mod (github.com/argoproj/argo-cd/v3); run hack/sync-argo-cd-helm-chart-version.sh after bumping that module.
    # Prefer `make helm-dependency-update` (or hack/helm-dependency-update.sh) so argo-helm is registered before `helm dependency update`.
    version: 9.5.2
    repository: https://argoproj.github.io/argo-helm
    condition: argoCD.enabled
    alias: argocd
home: https://github.com/argoproj-labs/argocd-agent
sources:
  - https://github.com/argoproj-labs/argocd-agent
keywords:
  - argocd
  - gitops
  - agent
maintainers:
  - name: Argo Project Maintainers
    url: https://github.com/argoproj-labs/argocd-agent
kubeVersion: ">=1.24.0-0"
annotations:
  charts.openshift.io/name: "Argo CD Agent - Agent Component"
  argocd-agent.argoproj-labs.io/argo-cd-module-version: v3.3.7
  argocd-agent.argoproj-labs.io/argo-cd-chart-version: 9.5.2
