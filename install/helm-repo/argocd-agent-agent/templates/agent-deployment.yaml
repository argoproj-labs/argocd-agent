apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argocd-agent-agent.agentDeploymentName" . }}
  namespace: {{ include "argocd-agent-agent.namespace" . }}
  labels:
    {{- include "argocd-agent-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "argocd-agent-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "argocd-agent-agent.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "argocd-agent-agent.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: "OnRootMismatch"
        runAsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: argocd-agent-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - agent
          env:
          - name: ARGOCD_AGENT_REMOTE_SERVER
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.server.address
                optional: true
          - name: ARGOCD_AGENT_REMOTE_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.server.port
                optional: true
          - name: ARGOCD_AGENT_LOG_LEVEL
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.log.level
                optional: true
          - name: ARGOCD_AGENT_NAMESPACE
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.namespace
                optional: true
          - name: ARGOCD_AGENT_TLS_SECRET_NAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.tls.secret-name
                optional: true
          - name: ARGOCD_AGENT_TLS_CLIENT_CERT_PATH
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.tls.client.cert-path
                optional: true
          - name: ARGOCD_AGENT_TLS_CLIENT_KEY_PATH
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.tls.client.key-path
                optional: true
          - name: ARGOCD_AGENT_TLS_INSECURE
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.tls.client.insecure
                optional: true
          - name: ARGOCD_AGENT_TLS_ROOT_CA_SECRET_NAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.tls.root-ca-secret-name
                optional: true
          - name: ARGOCD_AGENT_TLS_ROOT_CA_PATH
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.tls.root-ca-path
                optional: true
          - name: ARGOCD_AGENT_TLS_MIN_VERSION
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.tls.min-version
                optional: true
          - name: ARGOCD_AGENT_TLS_MAX_VERSION
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.tls.max-version
                optional: true
          - name: ARGOCD_AGENT_TLS_CIPHERSUITES
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.tls.ciphersuites
                optional: true
          - name: ARGOCD_AGENT_MODE
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.mode
                optional: true
          - name: ARGOCD_AGENT_CREDS
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.creds
                optional: true
          - name: ARGOCD_AGENT_METRICS_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.metrics.port
                optional: true
          - name: ARGOCD_AGENT_HEALTH_CHECK_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.healthz.port
                optional: true
          - name: REDIS_ADDR
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.redis.address
                optional: true
          - name: ARGOCD_AGENT_KEEP_ALIVE_PING_INTERVAL
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.keep-alive.interval
                optional: true
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.argoCdRedisSecretName }}
                key: {{ .Values.argoCdRedisPasswordKey }}
                optional: true
          - name: REDIS_USERNAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.redis.username
                optional: true
          - name: ARGOCD_PRINCIPAL_LOG_FORMAT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.log.format
                optional: true
          - name: ARGOCD_AGENT_ENABLE_WEBSOCKET
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.websocket.enabled
                optional: true
          - name: ARGOCD_AGENT_ENABLE_COMPRESSION
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.compression.enabled
                optional: true
          - name: ARGOCD_AGENT_PPROF_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.pprof.port
                optional: true
          - name: ARGOCD_AGENT_ENABLE_RESOURCE_PROXY
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.resource-proxy.enabled
                optional: true
          - name: ARGOCD_AGENT_CACHE_REFRESH_INTERVAL
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.cache.refresh-interval
                optional: true
          - name: ARGOCD_AGENT_DESTINATION_BASED_MAPPING
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.destination-based-mapping
                optional: true
          - name: ARGOCD_AGENT_CREATE_NAMESPACE
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.create-namespace
                optional: true
          - name: ARGOCD_AGENT_ALLOWED_NAMESPACES
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-agent.paramsConfigMapName" . }}
                key: agent.allowed-namespaces
                optional: true
          ports:
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
              protocol: TCP
            - name: healthz
              containerPort: {{ .Values.healthzPort }}
              protocol: TCP
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.httpGet.path }}
              port: {{ .Values.probes.liveness.httpGet.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.httpGet.path }}
              port: {{ .Values.probes.readiness.httpGet.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: userpass-passwd
              mountPath: /app/config/creds
              readOnly: true
      volumes:
        - name: userpass-passwd
          secret:
            secretName: {{ .Values.userPasswordSecretName }}
            items:
              - key: credentials
                path: userpass.creds
            optional: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
