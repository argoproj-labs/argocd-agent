apiVersion: v1
kind: Service
metadata:
  name: {{ include "argocd-agent-agent.metricsServiceName" . }}
  namespace: {{ include "argocd-agent-agent.namespace" . }}
  labels:
    {{- include "argocd-agent-agent.labels" . | nindent 4 }}
  {{- with .Values.service.metrics.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ports:
    - name: metrics
      protocol: TCP
      port: {{ .Values.service.metrics.port }}
      targetPort: {{ .Values.service.metrics.targetPort }}
  selector:
    {{- include "argocd-agent-agent.selectorLabels" . | nindent 4 }}